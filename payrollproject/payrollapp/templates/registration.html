<!DOCTYPE html>
<html lang="en">
<head>
    {%load static%}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="static/css/empregister.css">
</head>
<body>
   
  <div class="form-register">
    <div class="register-heading">
     <h2>Employee Registration</h2>
   </div>
      <form action="" method="post" enctype="multipart/form-data">{% csrf_token %}
        <label for="">Employee Name</label><br>
        <input type="text" name="emp_name"><br>
        <label for="">Employee id</label><br>
        <input type="text" name="emp_id"><br>
        <label for="">Designation</label><br>
        <input type="text" name="designation"><br>
        <label for="">Joining Date</label><br>
        <input type="date" name="joining_date"><br>
        <label for="">Basic Salary</label><br>
        <input type="number" name="basic_salary"><br>
        <label for="">HRA%</label><br>
        <input type="number" name="hra"><br>
        <label for="">DA%</label><br>
        <input type="number"  name="da"><br>
        <label for="">Allowance%</label><br>
        <input type="number"  name="allowance"><br>
        <label for="">Pf%</label><br>
        <input type="number" name="pf"><br>
        <label for="">Esi%</label><br>
        <input type="number"  name="esi"><br>
        <input type="submit" value="Register">
        
    </form>
  </div>
  <div class="button_container">
    <a href="http://127.0.0.1:8000/payrollapp/login/">Login</a>
    <a href="http://127.0.0.1:8000/payrollapp/register/">Register</a>
  </div>
</body>
</html>
